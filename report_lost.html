<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="../photos/icon.jpg" type="image/x-icon">
  <link rel="stylesheet" href="../main_index/style.css"/>
  <link rel="stylesheet" href="report-lost.css"/>
  <title>Report Lost • Lost2Found</title>
</head>
<body>
  <!-- Shared header -->
  <div id="site-header"></div>
<header>
  <div class="nav" role="navigation" aria-label="Primary">
    <a class="brand" href="index.html">
      <img src="../photos/logo.png" alt="Lost2Found logo" />
    </a>
    <div class="spacer"></div>
    <nav>
     <a href="../main_index/index.html">Home</a>
      <a href="../about/about.html" aria-current="page">About</a>
      <a href="../contact/contact.html">Contact</a>
      <a href="../report_lost/report_lost.html">Report Lost</a>
      <a href="../report_found/reportfound.html">Report Found</a>
      <a href="../login/login.html" class="btn btn-ghost">Login</a>
    </nav>
  </div>
</header>
  <main id="main" class="lost-wrap" aria-labelledby="lost-title">
    <section class="lost-card">
      <header class="lost-head">
        <img src="../photos/logo.png" alt="Lost2Found logo" />
        <h1 id="lost-title">Report a Lost Item</h1>
        <p class="muted">Fill in the details to help others identify and return your lost item.</p>
      </header>

      <form id="lost-form" novalidate>
        <div class="grid-2">
          <label class="field">
            <span class="label">Item name</span>
            <input class="input" type="text" name="title" placeholder="e.g., Black Wallet" required>
          </label>

          <label class="field">
            <span class="label">Category</span>
            <select class="input" name="category" required>
              <option value="">Select category</option>
              <option>Wallet</option>
              <option>Keys</option>
              <option>Phone</option>
              <option>Bag</option>
              <option>Other</option>
            </select>
          </label>
        </div>

        <div class="grid-2">
          <label class="field">
            <span class="label">Location lost</span>
            <input class="input" type="text" name="location" placeholder="e.g., Mirpur Bus Stand" required>
          </label>

          <label class="field">
            <span class="label">Date lost</span>
            <input class="input" type="date" name="date" required>
          </label>
        </div>

        <label class="field">
          <span class="label">Description</span>
          <textarea class="input textarea" name="description" rows="4" placeholder="Color, unique marks, last seen..." required></textarea>
        </label>

        <label class="field">
          <span class="label">Upload photo (optional)</span>
          <input class="input" type="file" name="photo" accept="image/*">
        </label>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Submit Report</button>
          <a class="btn btn-ghost" href="index.html">Cancel</a>
        </div>
      </form>

      <!-- Success message -->
      <div id="lost-success" class="success">
        <h2>✅ Report Submitted!</h2>
        <p>Thank you for reporting. Others can now see this item.</p>
        <a href="index.html" class="btn btn-primary">Back to Home</a>
      </div>
    </section>
  </main>

  <footer class="lost-footer">
    © <span id="year"></span> Lost2Found
  </footer>

  <script src="js/include.js" defer></script>
  <script src="report-lost.js" defer></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

const form = document.getElementById('lost-form');
const successBox = document.getElementById('lost-success');

form.addEventListener('submit', (e) => {
  e.preventDefault();

  // Basic validation
  const required = ['title','category','location','date','description'];
  const fd = new FormData(form);
  for (const key of required) {
    if (!(fd.get(key) || '').toString().trim()) {
      alert('Please fill all required fields.');
      return;
    }
  }

  // Simulate "save"
  form.style.display = 'none';
  successBox.classList.add('show');
});

  </script>
</body>
</html>
